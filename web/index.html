  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
      background-image: url("splash/img/light-background.png");
      background-size: cover;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>

  <!-- Register Firebase Messaging Service Worker for Web Push Notifications -->
  <!-- Note: iOS Safari has limited service worker support, so we wrap in try-catch -->
  <script>
    (function() {
      // Check if service workers are supported
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          // iOS Safari requires special handling
          var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
          
          navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then(function (registration) {
              console.log('Firebase Messaging SW registered:', registration.scope);
            })
            .catch(function (error) {
              // Don't fail the entire app if SW fails (common on iOS)
              console.warn('Firebase Messaging SW registration failed (this is OK on iOS):', error);
            });
        });
      } else {
        console.log('Service workers not supported in this browser');
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async=""></script>
