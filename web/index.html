<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Geolocation Permission Policy -->
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AutoOlinda">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>AutoOlinda</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://js.stripe.com/v3/"></script>
  
  <!-- Lottie Web Player for splash animation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0077B6;
      background-size: 100% 100%;
    }

    #splash-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0077B6;
      z-index: 9999;
    }

    #lottie-animation {
      width: 60%;
      max-width: 400px;
      height: auto;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      var splash = document.getElementById("splash-container");
      if (splash) {
        splash.style.transition = "opacity 0.3s ease-out";
        splash.style.opacity = "0";
        setTimeout(function() {
          splash.remove();
        }, 300);
      }
      document.body.style.background = "transparent";
    }
    
    // Auto-remove splash when Flutter app is ready
    window.addEventListener('flutter-first-frame', function() {
      removeSplashFromWeb();
    });
    
    // Fallback: Remove splash after a timeout in case the event doesn't fire
    setTimeout(function() {
      removeSplashFromWeb();
    }, 10000);
  </script>
</head>

<body>
  <div id="splash-container">
    <div id="lottie-animation"></div>
  </div>
  
  <script>
    // Initialize Lottie animation
    var animation = lottie.loadAnimation({
      container: document.getElementById('lottie-animation'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: 'assets/animations/limpando.json'
    });
  </script>
  
  <!-- Register Firebase Messaging Service Worker for Web Push Notifications -->
  <!-- Note: iOS Safari has limited service worker support, so we wrap in try-catch -->
  <script>
    (function() {
      // Check if service workers are supported
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          // iOS Safari requires special handling
          var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
          
          navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then(function (registration) {
              console.log('Firebase Messaging SW registered:', registration.scope);
            })
            .catch(function (error) {
              // Don't fail the entire app if SW fails (common on iOS)
              console.warn('Firebase Messaging SW registration failed (this is OK on iOS):', error);
            });
        });
      } else {
        console.log('Service workers not supported in this browser');
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
